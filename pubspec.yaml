name: norigo_app
description: "Norigo - Japan & Korea Travel App"
publish_to: 'none'
version: 1.0.10+11

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1

  # HTTP
  dio: ^5.7.0

  # Routing
  go_router: ^14.8.1

  # URL launcher (affiliate links)
  url_launcher: ^6.3.1

  # Image caching
  cached_network_image: ^3.4.1

  # Local storage
  shared_preferences: ^2.3.4

  # UUID
  uuid: ^4.5.1

  # Internationalization
  intl: ^0.20.2

  # Markdown (guide pages)
  flutter_markdown: ^0.7.6

  # Maps
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # SVG rendering
  flutter_svg: ^2.0.17
  webview_flutter: ^4.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true

  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter.ttf

  assets:
    - assets/images/landmarks/
    - assets/images/illustrations/
    - assets/data/
